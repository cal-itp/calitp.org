name: calitp-dot-org

services:
  site:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: calitp-dot-org:site
    command: sleep infinity
    ports:
      - 8080:8080
    volumes:
      - ..:/home/calitp/site
      # ensure the workspace mount above does not obscure the npm deps
      # originally laid down in the container's isolated filesystem
      # this allows for better caching than running npm install in a lifecycle hook
      - /home/calitp/site/node_modules

  docs:
    image: calitp-dot-org:site
    entrypoint: mkdocs
    command: serve --dev-addr "0.0.0.0:8001"
    ports:
      - 8001:8001
    volumes:
      - ../:/home/calitp/site
